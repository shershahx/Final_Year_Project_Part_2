---
################################################################################
#   CONFIGTX FILE FOR HEC UNIVERSITY NETWORK - FINAL WORKING VERSION
################################################################################

Organizations:

  - &HecOrdererOrg
      Name: HecOrderer
      ID: HecOrdererMSP
      MSPDir: organizations/ordererOrganizations/hec.fyp.com/msp

      Policies:
        Readers:
          Type: Signature
          Rule: "OR('HecOrdererMSP.member')"
        Writers:
          Type: Signature
          Rule: "OR('HecOrdererMSP.member')"
        Admins:
          Type: Signature
          Rule: "OR('HecOrdererMSP.admin')"

      OrdererEndpoints:
        - hec-orderer.hec.fyp.com:7050

  - &HecUniversityOrg
      Name: HecUniversity
      ID: HecUniversityMSP
      MSPDir: organizations/peerOrganizations/hecuni.fyp.com/msp

      Policies:
        Readers:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin', 'HecUniversityMSP.peer', 'HecUniversityMSP.client')"
        Writers:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin', 'HecUniversityMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin')"

      AnchorPeers:
        - Host: peer0.hecuni.fyp.com
          Port: 7051

################################################################################
# ORDERER SECTION
################################################################################

Orderer: &OrdererDefaults

  OrdererType: etcdraft

  Addresses:
    - hec-orderer.hec.fyp.com:7050

  EtcdRaft:
    Consenters:
      - Host: hec-orderer.hec.fyp.com
        Port: 7050
        ClientTLSCert: organizations/ordererOrganizations/hec.fyp.com/orderers/hec-orderer.hec.fyp.com/tls/signcerts/cert.pem
        ServerTLSCert: organizations/ordererOrganizations/hec.fyp.com/orderers/hec-orderer.hec.fyp.com/tls/signcerts/cert.pem

  BatchTimeout: 2s

  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB

  Policies:
    Readers:
      Type: Signature
      Rule: "OR('HecOrdererMSP.member')"
    Writers:
      Type: Signature
      Rule: "OR('HecOrdererMSP.member')"
    Admins:
      Type: Signature
      Rule: "OR('HecOrdererMSP.admin')"

  Capabilities:
    Orderer: V2_0

################################################################################
# CHANNEL CONFIG DEFAULTS
################################################################################

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: Signature
      Rule: "OR('HecOrdererMSP.admin', 'HecUniversityMSP.admin')"
    Writers:
      Type: Signature
      Rule: "OR('HecOrdererMSP.admin', 'HecUniversityMSP.admin')"
    Admins:
      Type: Signature
      Rule: "OR('HecOrdererMSP.admin', 'HecUniversityMSP.admin')"

  Capabilities:
    Channel: V2_0

################################################################################
# PROFILES
################################################################################

Profiles:

  # Genesis block profile
  HecUniversityGenesis:
    <<: *ChannelDefaults

    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *HecOrdererOrg

    Consortiums:
      HecConsortium:
        Organizations:
          - *HecUniversityOrg

  # Application channel profile
  HecUniversityChannel:
    Consortium: HecConsortium

    Application:
      Organizations:
        - *HecUniversityOrg

      Policies:
        Readers:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin', 'HecUniversityMSP.client', 'HecUniversityMSP.peer')"
        Writers:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin', 'HecUniversityMSP.client')"
        Admins:
          Type: Signature
          Rule: "OR('HecUniversityMSP.admin')"

      Capabilities:
        Application: V2_0
